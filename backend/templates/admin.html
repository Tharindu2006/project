<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Care Connect Admin</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f6f8fb; color: #1a202c; }
    header { background:#0f3f7a; color:white; padding:16px 24px; display:flex; justify-content:space-between; align-items:center; }
    h1 { margin:0; font-size:22px; }
    a { color:#0f3f7a; text-decoration:none; }
    .container { max-width: 1200px; margin: 24px auto; padding: 0 16px; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; align-items: start; }
    section { background:white; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.05); padding:20px; }
    section h2 { margin-top:0; border-bottom:1px solid #e2e8f0; padding-bottom:10px; }
    .scrollable { max-height: 60vh; overflow-y: auto; padding-right: 4px; }
    .scrollable::-webkit-scrollbar { width: 8px; }
    .scrollable::-webkit-scrollbar-track { background: #edf2f7; border-radius: 6px; }
    .scrollable::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 6px; }
    .scrollable::-webkit-scrollbar-thumb:hover { background: #a0aec0; }
    .card { border:1px solid #e2e8f0; border-radius:10px; padding:12px; margin-bottom:12px; background:#f8fafc; }
    .pill { display:inline-block; padding:4px 10px; background:#e8f1ff; color:#0f3f7a; border-radius:99px; font-size:12px; margin-right:6px; }
    button { padding:8px 12px; border:none; border-radius:8px; cursor:pointer; font-weight:600; }
    .danger { background:#e53e3e; color:white; }
    .secondary { background:#edf2f7; color:#1a202c; }
  </style>
</head>
<body>
  <header>
    <h1>Admin Portal</h1>
    <div>
      <button class="secondary" onclick="location.href='/?noadmin=1'">Back to Site</button>
      <button class="danger" onclick="logout()">Logout</button>
    </div>
  </header>
  <div class="container">
    <section>
      <h2>Care Requests</h2>
      <div id="requests" class="scrollable"></div>
    </section>
    <section>
      <h2>Caregivers</h2>
      <div id="caregivers" class="scrollable"></div>
    </section>
    <section>
      <h2>Pending Users</h2>
      <div id="pending" class="scrollable"></div>
    </section>
    <section>
      <h2>Hospitals</h2>
      <form onsubmit="event.preventDefault(); addHospital();">
        <label for="hospitalName" style="font-weight:600; color:#2d3748;">Add a hospital</label>
        <div style="display:flex; gap:8px; margin-top:6px;">
          <input id="hospitalName" placeholder="e.g., Sunrise Medical Center" style="flex:1; padding:10px; border:1px solid #e2e8f0; border-radius:8px;" />
          <button type="submit">Add</button>
        </div>
      </form>
      <div id="hospitals" class="scrollable" style="margin-top:14px;"></div>
    </section>
  </div>

  <script>
    const api = (path, opts={}) =>
      fetch(path, Object.assign({credentials:"include", headers:{"Content-Type":"application/json"}}, opts));

    async function loadRequests() {
      const res = await api('/api/care-requests');
      if(!res.ok) { requests.innerHTML = 'Failed to load.'; return; }
      const items = await res.json();
      requests.innerHTML = items.map(r => `
        <div class="card">
          <div><strong>${r.title}</strong></div>
          <div>${r.description}</div>
          <div><span class="pill">${r.hospital?.name || ''}</span> <span class="pill">${r.status}</span> <span class="pill" style="background:${r.is_approved?'#e6fffa':'#fff5f5'};color:${r.is_approved?'#0b6459':'#9b2c2c'};">${r.is_approved?'Approved':'Pending'}</span></div>
          <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;">
            ${r.is_approved ? '' : `<button onclick="approveRequest(${r.id})">Approve</button>`}
            <button class="danger" onclick="deleteRequest(${r.id})">Delete Request</button>
          </div>
        </div>
      `).join('') || 'No requests';
    }

    async function loadCaregivers() {
      const res = await api('/api/caregivers');
      if(!res.ok) { caregivers.innerHTML = 'Failed to load.'; return; }
      const items = await res.json();
      caregivers.innerHTML = items.map(c => `
        <div class="card">
          <div><strong>${c.name}</strong> <span class="pill">${c.role}</span></div>
          <div>${c.email || ''}</div>
          <div>${(c.hospitals||[]).map(h=>`<span class="pill">${h.name}</span>`).join('')}</div>
          <button class="danger" onclick="deleteUser(${c.id})">Remove Caregiver</button>
        </div>
      `).join('') || 'No caregivers';
    }

    async function loadPending() {
      const res = await api('/api/admin/users/pending');
      if(!res.ok) { pending.innerHTML = 'Failed to load pending users.'; return; }
      const items = await res.json();
      pending.innerHTML = items.map(u => `
        <div class="card">
          <div><strong>${u.name}</strong> <span class="pill">${u.role}</span></div>
          <div>${u.email}</div>
          <div>${u.phone || ''}</div>
          <div style="display:flex; gap:8px; margin-top:8px;">
            <button onclick="approveUser(${u.id})">Approve</button>
            <button class="danger" onclick="deleteUser(${u.id})">Delete</button>
          </div>
        </div>
      `).join('') || 'No pending users';
    }

    async function loadHospitals() {
      const res = await api('/api/hospitals');
      if(!res.ok) { hospitals.innerHTML = 'Failed to load hospitals.'; return; }
      const items = await res.json();
      hospitals.innerHTML = items.map(h => `
        <div class="card"><strong>${h.name}</strong></div>
      `).join('') || 'No hospitals yet';
    }

    async function addHospital() {
      const name = hospitalName.value.trim();
      if(!name) { alert('Enter a hospital name'); return; }
      const res = await api('/api/admin/hospitals', { method:'POST', body: JSON.stringify({ name }) });
      const data = await res.json();
      if(!res.ok) { alert(data.error || 'Failed to add hospital'); return; }
      hospitalName.value = '';
      loadHospitals();
      alert('Hospital added');
    }

    async function deleteRequest(id) {
      if(!confirm('Delete this request?')) return;
      const res = await api(`/api/admin/care-requests/${id}`, { method:'DELETE' });
      alert(res.ok ? 'Deleted' : 'Failed');
      loadRequests();
    }

    async function approveRequest(id) {
      const res = await api(`/api/admin/care-requests/${id}/approve`, { method:'POST' });
      const data = await res.json();
      alert(res.ok ? 'Approved' : (data.error || 'Failed'));
      loadRequests();
    }

    async function deleteUser(id) {
      if(!confirm('Remove this user? This also deletes related requests/acceptances.')) return;
      const res = await api(`/api/admin/users/${id}`, { method:'DELETE' });
      alert(res.ok ? 'Removed' : 'Failed');
      loadPending();
      loadCaregivers();
      loadRequests();
    }

    async function approveUser(id) {
      const res = await api(`/api/admin/users/${id}/approve`, { method:'POST' });
      const data = await res.json();
      if(!res.ok) { alert(data.error || 'Failed to approve'); return; }
      loadPending();
      loadCaregivers();
    }

    async function logout() {
      await api('/api/logout',{method:'POST'});
      location.href = '/';
    }

    loadRequests();
    loadCaregivers();
    loadHospitals();
    loadPending();
  </script>
</body>
</html>
