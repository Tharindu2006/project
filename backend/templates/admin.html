<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Care Connect Admin</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f6f8fb; color: #1a202c; }
    header { background:#0f3f7a; color:white; padding:16px 24px; display:flex; justify-content:space-between; align-items:center; }
    h1 { margin:0; font-size:22px; }
    a { color:#0f3f7a; text-decoration:none; }
    .container { max-width: 1200px; margin: 24px auto; padding: 0 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    section { background:white; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.05); padding:20px; }
    section h2 { margin-top:0; border-bottom:1px solid #e2e8f0; padding-bottom:10px; }
    .card { border:1px solid #e2e8f0; border-radius:10px; padding:12px; margin-bottom:12px; background:#f8fafc; }
    .pill { display:inline-block; padding:4px 10px; background:#e8f1ff; color:#0f3f7a; border-radius:99px; font-size:12px; margin-right:6px; }
    button { padding:8px 12px; border:none; border-radius:8px; cursor:pointer; font-weight:600; }
    .danger { background:#e53e3e; color:white; }
    .secondary { background:#edf2f7; color:#1a202c; }
  </style>
</head>
<body>
  <header>
    <h1>Admin Portal</h1>
    <div>
      <button class="secondary" onclick="location.href='/'">Back to Site</button>
      <button class="danger" onclick="logout()">Logout</button>
    </div>
  </header>
  <div class="container">
    <section>
      <h2>Care Requests</h2>
      <div id="requests"></div>
    </section>
    <section>
      <h2>Caregivers</h2>
      <div id="caregivers"></div>
    </section>
  </div>

  <script>
    const api = (path, opts={}) =>
      fetch(path, Object.assign({credentials:"include", headers:{"Content-Type":"application/json"}}, opts));

    async function loadRequests() {
      const res = await api('/api/care-requests');
      if(!res.ok) { requests.innerHTML = 'Failed to load.'; return; }
      const items = await res.json();
      requests.innerHTML = items.map(r => `
        <div class="card">
          <div><strong>${r.title}</strong></div>
          <div>${r.description}</div>
          <div><span class="pill">${r.hospital?.name || ''}</span> <span class="pill">${r.status}</span></div>
          <button class="danger" onclick="deleteRequest(${r.id})">Delete Request</button>
        </div>
      `).join('') || 'No requests';
    }

    async function loadCaregivers() {
      const res = await api('/api/caregivers');
      if(!res.ok) { caregivers.innerHTML = 'Failed to load.'; return; }
      const items = await res.json();
      caregivers.innerHTML = items.map(c => `
        <div class="card">
          <div><strong>${c.name}</strong> <span class="pill">${c.role}</span></div>
          <div>${c.email || ''}</div>
          <div>${(c.hospitals||[]).map(h=>`<span class="pill">${h.name}</span>`).join('')}</div>
          <button class="danger" onclick="deleteCaregiver(${c.id})">Remove Caregiver</button>
        </div>
      `).join('') || 'No caregivers';
    }

    async function deleteRequest(id) {
      if(!confirm('Delete this request?')) return;
      const res = await api(`/api/admin/care-requests/${id}`, { method:'DELETE' });
      alert(res.ok ? 'Deleted' : 'Failed');
      loadRequests();
    }

    async function deleteCaregiver(id) {
      if(!confirm('Remove this caregiver?')) return;
      const res = await api(`/api/admin/caregivers/${id}`, { method:'DELETE' });
      alert(res.ok ? 'Removed' : 'Failed');
      loadCaregivers();
    }

    async function logout() {
      await api('/api/logout',{method:'POST'});
      location.href = '/';
    }

    loadRequests();
    loadCaregivers();
  </script>
</body>
</html>
